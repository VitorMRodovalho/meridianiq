<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="MeridianIQ — Open-source P6 XER schedule intelligence platform. DCMA validation, critical path, forensic delay analysis, Monte Carlo, interactive Gantt." />
		<meta property="og:title" content="MeridianIQ — Schedule Intelligence Platform" />
		<meta property="og:description" content="Upload a P6 XER file and get instant schedule validation, critical path analysis, forensic delay analysis, and interactive Gantt visualization." />
		<meta property="og:type" content="website" />
		<meta name="twitter:card" content="summary" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<script>
			(function() {
				var s = localStorage.getItem('meridianiq-theme');
				var d = s === 'dark' || (s === null && window.matchMedia('(prefers-color-scheme: dark)').matches);
				if (d) document.documentElement.classList.add('dark');
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
