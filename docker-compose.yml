services:
  meridianiq-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    env_file:
      - .env

  meridianiq-web:
    build:
      context: ./web
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - meridianiq-api
