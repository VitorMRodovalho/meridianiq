services:
  meridianiq-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    # Note: Requires .env with SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY
    env_file:
      - .env

