app = "meridianiq-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # Cold-start mitigation (BUG-007): keep at least 1 machine always running.
  # `auto_stop_machines = "stop"` still scales DOWN excess machines (e.g.,
  # under load Fly may add 2-3 machines, idle scales back to 1).
  # `min_machines_running = 1` is the floor — guarantees one warm worker so
  # the first request after idle doesn't return 502 (HTTP/2 connection drop
  # in the browser → false-CORS error). Cost delta ~$5-8/month for the 1
  # always-on machine. Pairs with PR #65 (frontend surface-errors fix);
  # this is the BACKEND half of the same root cause.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  # Bumped 1024mb→2048mb on 2026-05-06 after OOM incident on idle instance.
  # Root cause hypothesis: slow native-allocation leak (numpy/scipy/Cairo)
  # accumulating over ~40 days of uptime — even with no user traffic.
  # Pairs with /api/v1/admin/runtime + Sentry breadcrumb (Tier 2 D
  # instrumentation) to confirm the leak curve. If 2048mb still OOMs,
  # next step is forkserver in ProcessPoolExecutor (ADR-0015 amendment).
  memory = "2048mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/health"
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
