version: 2

updates:
  # Python backend dependencies (pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    labels:
      - "deps"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      # Keep patch/minor updates batched — less PR noise
      backend-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # pyiceberg is a TRANSITIVE dep (supabase → storage3 → pyiceberg).
      # The pin-major rule below is defensive: a major bump arriving via
      # transitive resolution can break Docker deploy if the new pyiceberg
      # major drops Python 3.13 wheel support OR adds incompatible C-ext
      # build requirements (see commit df672d9 for history). Patches/minors
      # of pyiceberg flow through normally — only majors require manual
      # eval against the Dockerfile Python pin.
      - dependency-name: "pyiceberg"
        update-types: ["version-update:semver-major"]

  # Frontend dependencies (web/package.json)
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    labels:
      - "deps"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      svelte-ecosystem:
        patterns:
          - "svelte*"
          - "@sveltejs/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      frontend-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflow pins
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
