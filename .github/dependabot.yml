version: 2

updates:
  # Python backend dependencies (pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    labels:
      - "deps"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      # Keep patch/minor updates batched — less PR noise
      backend-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Pin pyiceberg while 3.14 wheel is missing (see CLAUDE.md gotcha)
      - dependency-name: "pyiceberg"
        update-types: ["version-update:semver-major"]

  # Frontend dependencies (web/package.json)
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    labels:
      - "deps"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      svelte-ecosystem:
        patterns:
          - "svelte*"
          - "@sveltejs/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      frontend-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflow pins
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
